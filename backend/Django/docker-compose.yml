services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DATABASE_URL: postgres://${POSTGRES_USER:-syscare}:${POSTGRES_PASSWORD:-syscare}@db:5432/${POSTGRES_DB:-syscare}
      DJANGO_ENV: ${DJANGO_ENV:-development}
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-settings.development}
      POSTGRES_DB: ${POSTGRES_DB:-syscare}
      POSTGRES_USER: ${POSTGRES_USER:-syscare}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./:/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-syscare}
      POSTGRES_USER: ${POSTGRES_USER:-syscare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-syscare}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
